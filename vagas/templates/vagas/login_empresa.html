{% extends 'vagas/base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow border-0 mt-5">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <h2 class="fw-bold text-dark">Portal da Empresa</h2>
                    <p class="text-muted">Gerencie suas vagas e candidatos</p>
                </div>

                <form method="post">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label for="email" class="form-label fw-semibold">E-mail Corporativo</label>
                        <input type="email" name="email" id="email" class="form-control" placeholder="rh@empresa.com"
                            required>
                    </div>

                    <div class="mb-4">
                        <label for="cnpj" class="form-label fw-semibold">CNPJ</label>
                        <input type="text" name="cnpj" id="cnpj" class="form-control" placeholder="00.000.000/0000-00"
                            required>
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-dark btn-lg">Acessar Painel</button>
                        <a href="{% url 'home' %}" class="btn btn-outline-secondary">Voltar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
